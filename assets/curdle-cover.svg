  </g>
  <!-- wordmark -->
  <text x="70" y="610" font-size="92" font-weight="700" fill="#f0ede8" letter-spacing="-2">Curdle</text>
  <text x="74" y="660" font-size="30" font-weight="400" fill="rgba(255,255,255,0.55)" letter-spacing="0.5">video → fluid dynamics</text>
  <g>
    <rect x="74" y="686" width="356" height="34" rx="17" fill="none" stroke="rgba(196,162,101,0.55)"/>
    <text x="92" y="709" font-size="17" font-weight="500" fill="#c4a265" letter-spacing="1.5">x402 · BASE · $0.05 / CALL · MODAL GPU</text>
  </g>
