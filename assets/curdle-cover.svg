<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" width="1200" height="750" font-family="'Space Grotesk', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="cbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0f14"/>
      <stop offset="1" stop-color="#05080b"/>
    </linearGradient>
    <linearGradient id="cflow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#78c8ff" stop-opacity="0"/>
      <stop offset="0.35" stop-color="#78c8ff" stop-opacity="0.9"/>
      <stop offset="0.7" stop-color="#c4a265" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#c4a265" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="750" fill="url(#cbg)"/>
  <!-- vorticity streamlines -->
  <g fill="none" stroke="url(#cflow)" stroke-linecap="round">
    <path d="M-40 160 C 260 60, 520 300, 820 180 S 1280 120, 1260 240" stroke-width="3" opacity="0.85"/>
    <path d="M-40 250 C 240 180, 560 380, 840 270 S 1260 230, 1260 330" stroke-width="2.4" opacity="0.7"/>
    <path d="M-40 340 C 300 280, 540 470, 880 360 S 1260 360, 1260 430" stroke-width="3.4" opacity="0.9"/>
    <path d="M-40 430 C 260 380, 600 560, 900 460 S 1260 470, 1260 520" stroke-width="2.2" opacity="0.6"/>
    <path d="M-40 520 C 320 470, 560 640, 920 540 S 1260 560, 1260 600" stroke-width="3" opacity="0.8"/>
  </g>
  <!-- dye particles -->
  <g fill="#78c8ff">
    <circle cx="430" cy="210" r="4" opacity="0.8"/>
    <circle cx="690" cy="300" r="3" opacity="0.6"/>
  </g>
  <g fill="#c4a265">
