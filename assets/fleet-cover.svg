<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" width="1200" height="750" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace">
  <defs>
    <linearGradient id="fbg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0a0c10"/><stop offset="1" stop-color="#050607"/></linearGradient>
    <linearGradient id="ftitle" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1b212b"/><stop offset="1" stop-color="#161b22"/></linearGradient>
    <radialGradient id="fglow" cx="0.5" cy="0.4" r="0.6"><stop offset="0" stop-color="#78c8ff" stop-opacity="0.08"/><stop offset="1" stop-color="#78c8ff" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="1200" height="750" fill="url(#fbg)"/>
  <ellipse cx="600" cy="330" rx="560" ry="360" fill="url(#fglow)"/>

  <!-- terminal window -->
  <rect x="46" y="44" width="1108" height="662" rx="16" fill="#0d1117" stroke="rgba(255,255,255,0.09)" stroke-width="1.5"/>

  <!-- title bar -->
  <path d="M46 60 a16 16 0 0 1 16 -16 H1138 a16 16 0 0 1 16 16 V96 H46 Z" fill="url(#ftitle)"/>
  <line x1="46" y1="96" x2="1154" y2="96" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <circle cx="84" cy="70" r="8" fill="#ff5f57"/>
  <circle cx="112" cy="70" r="8" fill="#febc2e"/>
  <circle cx="140" cy="70" r="8" fill="#28c840"/>
  <text x="600" y="77" font-size="21" fill="rgba(255,255,255,0.55)" text-anchor="middle" letter-spacing="0.5">fleet — refactor auth guard</text>

  <!-- body (monospace feed) -->
  <g font-size="25">
    <!-- command line -->
    <text x="88" y="160" xml:space="preserve"><tspan fill="#6e7681">~/auth</tspan> <tspan fill="#c4a265">❯</tspan> <tspan fill="#e6edf3">fleet run </tspan><tspan fill="#9ecbff">"refactor auth guard"</tspan><tspan fill="#e6edf3"> -n 4 </tspan><tspan fill="#6e7681">--judge</tspan></text>
    <!-- header -->
    <text x="88" y="208" font-size="22" fill="#8b949e"><tspan fill="#c4a265">▸</tspan> fanning out 4 agents · isolated git worktrees · test-gated</text>

    <!-- worker rows -->
    <g>
      <text x="100" y="272"><tspan fill="#78c8ff">w0 · sonnet</tspan></text>
      <text x="372" y="272" fill="#3fb950">✓ tests 12/12</text>
      <text x="660" y="272"><tspan fill="#3fb950">+148</tspan> <tspan fill="#f85149">−31</tspan></text>
      <text x="900" y="272" fill="#6e7681">.fleet/w0</text>

      <text x="100" y="324"><tspan fill="#c4a265">w1 · opus</tspan></text>
      <text x="372" y="324" fill="#3fb950">✓ tests 12/12</text>
      <text x="660" y="324"><tspan fill="#3fb950">+96</tspan> <tspan fill="#f85149">−22</tspan></text>
      <text x="900" y="324" fill="#6e7681">.fleet/w1</text>

      <text x="100" y="376"><tspan fill="#78c8ff">w2 · sonnet</tspan></text>
      <text x="372" y="376" fill="#f85149">✗ gate failed</text>
      <text x="660" y="376" fill="#8b949e">2 tests red</text>
      <text x="900" y="376" fill="#6e7681">.fleet/w2</text>

      <text x="100" y="428"><tspan fill="#c4a265">w3 · opus</tspan></text>
      <text x="372" y="428" fill="#febc2e">● running…</text>
      <text x="660" y="428" fill="#8b949e">synth candidate</text>
      <text x="900" y="428" fill="#6e7681">.fleet/w3</text>
    </g>

    <!-- separator -->
    <line x1="88" y1="464" x2="1112" y2="464" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

    <!-- judge / synthesize / winner -->
    <text x="88" y="516" xml:space="preserve"><tspan fill="#e6edf3">judge </tspan><tspan fill="#6e7681">▸</tspan><tspan fill="#e6edf3"> synthesize </tspan><tspan fill="#6e7681">▸</tspan><tspan fill="#e6edf3"> apply</tspan></text>
    <text x="490" y="516"><tspan fill="#6e7681">winner</tspan> <tspan fill="#c4a265">w1 · opus</tspan> <tspan fill="#3fb950">✓ applied</tspan></text>
  </g>

  <!-- status bar -->
  <rect x="47" y="642" width="1106" height="63" rx="0" fill="#11161d"/>
  <path d="M47 690 V690 H1153 V690 a16 16 0 0 1 -16 16 H63 a16 16 0 0 1 -16 -16 Z" fill="#11161d"/>
  <line x1="46" y1="642" x2="1154" y2="642" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <g font-size="22">
    <text x="88" y="681"><tspan fill="#c4a265">$0.074</tspan> <tspan fill="#6e7681">spent</tspan>   <tspan fill="#e6edf3">41.2k</tspan> <tspan fill="#6e7681">tok</tspan>   <tspan fill="#e6edf3">4</tspan> <tspan fill="#6e7681">worktrees</tspan>   <tspan fill="#e6edf3">1m18s</tspan></text>
    <text x="1112" y="681" text-anchor="end"><tspan fill="#8b949e">fleet</tspan> <tspan fill="#6e7681">v2</tspan></text>
  </g>
</svg>
