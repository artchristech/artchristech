<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" width="1200" height="750" font-family="'Space Grotesk', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="fbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0c10"/>
      <stop offset="1" stop-color="#050607"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="750" fill="url(#fbg)"/>
  <!-- four parallel agent lanes fanning into one synthesized result -->
  <g stroke-linecap="round" fill="none">
    <!-- lanes -->
    <path d="M150 150 H560 C720 150, 760 375, 900 375" stroke="rgba(120,200,255,0.7)" stroke-width="2.5"/>
    <path d="M150 290 H600 C740 290, 780 375, 900 375" stroke="rgba(120,200,255,0.55)" stroke-width="2.5"/>
    <path d="M150 430 H600 C740 430, 780 375, 900 375" stroke="rgba(196,162,101,0.6)" stroke-width="2.5"/>
    <path d="M150 570 H560 C720 570, 760 375, 900 375" stroke="rgba(196,162,101,0.5)" stroke-width="2.5"/>
  </g>
  <!-- agent nodes -->
  <g>
    <g fill="#78c8ff">
      <circle cx="150" cy="150" r="9"/><circle cx="150" cy="290" r="9"/>
    </g>
    <g fill="#c4a265">
      <circle cx="150" cy="430" r="9"/><circle cx="150" cy="570" r="9"/>
    </g>
  </g>
  <!-- worktree ticks along lanes -->
  <g fill="rgba(255,255,255,0.35)">
    <rect x="300" y="146" width="3" height="8"/><rect x="380" y="146" width="3" height="8"/>
    <rect x="300" y="286" width="3" height="8"/><rect x="380" y="286" width="3" height="8"/>
    <rect x="300" y="426" width="3" height="8"/><rect x="380" y="426" width="3" height="8"/>
    <rect x="300" y="566" width="3" height="8"/><rect x="380" y="566" width="3" height="8"/>
  </g>
  <!-- synthesized winner node -->
  <circle cx="905" cy="375" r="22" fill="none" stroke="#f0ede8" stroke-width="2"/>
  <circle cx="905" cy="375" r="10" fill="#f0ede8"/>
  <text x="945" y="368" font-size="20" font-weight="600" fill="#f0ede8">judge</text>
  <text x="945" y="392" font-size="20" font-weight="400" fill="rgba(255,255,255,0.5)">+ synthesize</text>
  <!-- wordmark -->
  <text x="70" y="660" font-size="92" font-weight="700" fill="#f0ede8" letter-spacing="-2">Fleet</text>
  <text x="74" y="700" font-size="28" font-weight="400" fill="rgba(255,255,255,0.55)">parallel Claude Code orchestrator</text>
</svg>
