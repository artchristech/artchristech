name: Deploy to Cloudflare Pages

on:
  push:
    branches: [master]
  workflow_dispatch:   # allows manual runs from the Actions tab

permissions:
  contents: read

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      HAS_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Build pruned dist
        run: bash build.sh

      - name: Deploy to Cloudflare Pages
        if: env.HAS_TOKEN == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 18dbff251dff1fe2d7f05a9d34845e1d
          command: pages deploy dist --project-name=artchristech --branch=master

      - name: Secret not set yet
        if: env.HAS_TOKEN != 'true'
        run: echo "::warning::CLOUDFLARE_API_TOKEN repo secret is not set — built dist but skipped deploy. Add it in Settings → Secrets and variables → Actions, then re-run."
